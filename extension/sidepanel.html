<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ResearchFlow</title>
    <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
    <div class="container">
        <div class="head">
            <div class="title-section">
                <h2>ResearchFlow</h2>
                <p class="tagline">AI Powered Research Assistant</p>
            </div>

            <div class="theme-wrapper">
                <button id="themeToggle">🌙</button>
                <span class="tooltip">Switch to Dark Mode</span>
            </div>
        </div>
        <div class="actions">
            <button id="summarizeBtn">Summarize</button>
        </div>

        <div class="notes">
            <h3>Research Notes</h3>
            <textarea id="notes" placeholder="Take notes here"></textarea>
            <button id="saveNotesBtn">Save Notes</button>
        </div>

        <div id="results"></div>
    </div>

    <script src="sidepanel.js"></script>
    
</body>
</html>
